<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>All Books</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="../style.css" />
  <link rel="stylesheet" href="select-book.css" />
  <style>
    .filter-bar {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin: 20px;
      flex-wrap: wrap;
    }
    .pagination {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 30px 0;
    }
    .pagination button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<!-- ✅ Navbar -->
<div id="navbar-container"></div>

<div class="filter-bar">
  <input type="text" id="search-input" placeholder="Search books..." />
  <button onclick="searchBooks()">Search</button>
</div>

<h1 style="text-align:center; margin-bottom: 20px;">All Books</h1>
<div class="grid" id="book-list">Loading books...</div>

<div class="pagination">
  <button onclick="changePage(-1)" id="prevBtn">Previous</button>
  <button onclick="changePage(1)" id="nextBtn">Next</button>
</div>

<script>
  const user = JSON.parse(localStorage.getItem("xpUser"));
  const username = user?.username || "guest";
  const storageKey = `favorite_books_${username}`;

  let allBooks = [];
  let currentPage = 1;
  const booksPerPage = 20;

  function getRandomQuery() {
    const commonWords = ["life", "love", "dream", "dark", "magic", "secret", "death", "star", "fire", "night"];
    return commonWords[Math.floor(Math.random() * commonWords.length)];
  }

  async function searchBooks() {
    const query = document.getElementById('search-input').value || getRandomQuery();
    const response = await fetch(`https://openlibrary.org/search.json?q=${query}&limit=40`);
    const data = await response.json();
    allBooks = data.docs;
    currentPage = 1;
    renderPage();
  }

  function renderPage() {
    const container = document.getElementById('book-list');
    container.innerHTML = '';

    const startIndex = (currentPage - 1) * booksPerPage;
    const endIndex = startIndex + booksPerPage;
    const booksToShow = allBooks.slice(startIndex, endIndex);

    booksToShow.forEach(book => {
      const card = document.createElement('div');
      card.className = 'game-card';
      const coverUrl = book.cover_i
        ? `https://covers.openlibrary.org/b/id/${book.cover_i}-M.jpg`
        : 'https://via.placeholder.com/300x450?text=No+Cover';

      const isFav = isFavorite(book.key);
      const heartClass = isFav ? 'fa-solid' : 'fa-regular';
      const heartColor = isFav ? 'red' : '';

      card.innerHTML = `
        <div class="card-icons">
          <i class="${heartClass} fa-heart" style="color: ${heartColor};" title="Toggle Favorite"></i>
          <i class="fa-solid fa-pen-to-square" title="Write Discussion"></i>
        </div>
        <img src="${coverUrl}" alt="${book.title}">
        <div class="game-title">${book.title}</div>
      `;

      card.querySelector('.fa-heart').addEventListener('click', (e) => toggleFavorite(e, book));
      card.addEventListener('click', (e) => {
        if (!e.target.classList.contains('fa-heart')) {
          window.location.href = `book-detail.html?key=${book.key}`;
        }
      });

      container.appendChild(card);
    });

    document.getElementById('prevBtn').disabled = currentPage === 1;
    document.getElementById('nextBtn').disabled = endIndex >= allBooks.length;
  }

  function changePage(delta) {
    const newPage = currentPage + delta;
    const totalPages = Math.ceil(allBooks.length / booksPerPage);
    if (newPage >= 1 && newPage <= totalPages) {
      currentPage = newPage;
      renderPage();
    }
  }

  function isFavorite(key) {
    const favorites = JSON.parse(localStorage.getItem(storageKey)) || [];
    return favorites.some(f => f.key === key);
  }

  function toggleFavorite(event, book) {
    event.stopPropagation();
    let favorites = JSON.parse(localStorage.getItem(storageKey)) || [];
    const heart = event.target;

    const exists = favorites.some(f => f.key === book.key);
    if (exists) {
      favorites = favorites.filter(f => f.key !== book.key);
      heart.classList.remove('fa-solid');
      heart.classList.add('fa-regular');
      heart.style.color = '';
    } else {
      favorites.push({
        key: book.key,
        title: book.title,
        cover: book.cover_i
      });
      heart.classList.remove('fa-regular');
      heart.classList.add('fa-solid');
      heart.style.color = 'red';
    }

    localStorage.setItem(storageKey, JSON.stringify(favorites));
  }

  window.onload = searchBooks;
</script>

<!-- ✅ Navbar script -->
<script src="/xpArchive-master/navbar/navbar.js"></script>
</body>
</html>
